<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>러시아워 게임 — 교통체증 퍼즐</title>
    <!--
      정적 서버가 /gridlock/index.html 요청을 슬래시 없는 /gridlock 으로 리다이렉트하는 경우가 있다
      (예: `serve` 패키지의 clean-url 동작). 그 상태에서는 ./style.css, ./game.js 같은 상대경로가
      /gridlock/ 이 아니라 루트(/) 기준으로 풀려 404가 난다. base 태그로 기준 경로를 고정해 이 문제를 원천 차단한다.
    -->
    <base href="/gridlock/" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <a class="back-link" href="../index.html">← 목록으로</a>
      <h1>러시아워 게임</h1>
      <p class="subtitle" id="subtitle">빨간 차를 오른쪽 출구로 빼내세요.</p>

      <div class="hud">
        <span id="stageIndicator">스테이지 1/5</span>
        <span id="moveCount">이동 0회</span>
        <span id="parCount" class="par-count">최소 0수</span>
        <span id="timer" class="par-count">00:00</span>
        <button id="muteBtn" type="button" aria-label="음소거">🔊</button>
        <button id="pauseBtn" type="button" aria-label="일시정지">⏸</button>
      </div>

      <div class="board-area">
        <canvas id="board" width="480" height="480" aria-label="러시아워 퍼즐 보드"></canvas>

        <div class="overlay" id="startOverlay">
          <p class="overlay-kicker">러시아워 게임</p>
          <p class="overlay-copy">빨간 목표 차량을 빛나는 출구로 빼내세요.<br />차량은 자기 방향으로만 움직입니다.</p>
          <button id="startBtn" type="button">시작하기</button>
        </div>

        <div class="overlay hidden" id="pauseOverlay">
          <p>일시정지</p>
          <button id="resumeBtn" type="button">계속하기</button>
        </div>

        <div class="overlay hidden" id="winOverlay">
          <p id="winText">🎉 클리어!</p>
        </div>

        <div class="stage-banner" id="stageBanner"><span id="stageBannerText">STAGE 1</span></div>
      </div>

      <canvas id="confetti" aria-hidden="true"></canvas>

      <div class="controls" id="controls">
        <div class="dpad" id="dpad">
          <button data-dir="up" type="button" aria-label="위로 이동">▲</button>
          <div class="dpad-row">
            <button data-dir="left" type="button" aria-label="왼쪽으로 이동">◀</button>
            <button data-dir="right" type="button" aria-label="오른쪽으로 이동">▶</button>
          </div>
          <button data-dir="down" type="button" aria-label="아래로 이동">▼</button>
        </div>
        <button class="hint-btn" id="hintBtn" type="button">💡 힌트</button>
        <p class="hint" id="hint">차량을 탭하거나 클릭해서 선택하세요. 키보드는 방향키/WASD.</p>
      </div>

      <div class="bottom-buttons">
        <button class="reset reset-outline" id="toStartBtn" type="button">처음으로</button>
        <button class="reset" id="restartBtn" type="button">다시하기</button>
      </div>
    </div>

    <!-- 개발놀이터 오락실 랭킹 SDK — 점수 제출, 자동 게임 등록, 공통 사운드 버튼 제공 -->
    <script src="https://game.dev-play.kr/sdk/rank.js"></script>
    <script>
      DevplayRank.init({
        gameCode: 'gridlock',
        gameName: '러시아워 게임',
        selfRegister: true,
        scoreOrder: 'asc', // 클리어 시간(초)이 낮을수록 좋은 점수
        scoreFormat: 'time',
      })
    </script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
